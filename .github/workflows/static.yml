name: Deploy static site with cache busting

on:
  push:
    branches: ["master"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache busting
        run: |
          VERSION=$(git rev-parse --short HEAD)
          
          for file in *.css *.js; do
            if [ -f "$file" ]; then
              ext="${file##*.}"
              base="${file%.*}"
              newname="${base}.${VERSION}.${ext}"
              mv "$file" "$newname"
              echo "Renamed $file → $newname"
              
              find . -type f -name "*.html" -exec sed -i \
                "s|${file}|${newname}|g" {} \;
            fi
          done
          
          if [ -f "manifest.json" ]; then
            sed -i "s|\.css\"|\.css?v=$VERSION\"|g; s|\.js\"|\.js?v=$VERSION\"|g" manifest.json
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
