name: Deploy static site with versioned cache

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build version
        run: |
          BUILD_VERSION="${GITHUB_SHA::8}-${GITHUB_RUN_NUMBER}"
          echo "Using build version: ${BUILD_VERSION}"
          sed -i "s/__BUILD_VERSION__/${BUILD_VERSION}/g" index.html sw.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
